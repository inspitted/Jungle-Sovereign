<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jungle Survival RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hud">
        <div class="stats-row">
            <span>Level: <span id="player-level">1</span></span>
            <span>Stage: <span id="current-stage">1</span></span>
        </div>
        <div class="exp-bar-container">
            <div id="exp-bar" class="exp-bar"></div>
        </div>
        <div class="currency-row">
            <span>Clicks: <strong id="click-count">0</strong></span>
            <span class="cps-text">(<span id="cps-count">0</span>/s)</span>
        </div>
    </header>

    <main id="main-content">
        <section id="tab-battle" class="tab-content active">
            <div class="battle-arena">
                <h2 id="enemy-name">Jungle Slime</h2>
                <div class="hp-bar-container">
                    <div id="hp-bar" class="hp-bar"></div>
                    <span id="hp-text">150 / 150</span>
                </div>
                <div id="enemy-sprite" class="enemy-sprite">🦠</div>
                <div class="battle-stats">
                    <p>Current Weapon: <span id="active-weapon-name">Bare Hands 👊</span></p>
                    <p>Damage per click: <span id="click-power">1</span></p>
                </div>
            </div>
        </section>

        <section id="tab-armory" class="tab-content">
            <h2>🌿 Armory</h2>
            <div id="armory-list" class="list-container">
                </div>
        </section>

        <section id="tab-gacha" class="tab-content">
            <h2>🥚 Pet Gacha</h2>
            <div id="gacha-list" class="list-container">
                </div>
        </section>

        <section id="tab-inventory" class="tab-content">
            <h2>🎒 Inventory</h2>
            <div class="inventory-section">
                <h3>Equipped Pets (Max 3)</h3>
                <div id="equipped-pets" class="pet-grid"></div>
            </div>
            <div class="inventory-section">
                <h3>My Pets</h3>
                <div id="pet-inventory" class="pet-grid"></div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-target="tab-battle">⚔️ Battle</button>
        <button class="nav-btn" data-target="tab-armory">🌿 Armory</button>
        <button class="nav-btn" data-target="tab-gacha">🥚 Gacha</button>
        <button class="nav-btn" data-target="tab-inventory">🎒 Inventory</button>
    </nav>

    <div id="floating-text-container"></div>

    <script src="script.js"></script>
</body>
</html>
